name: Dev Build

on:
    workflow_dispatch:
    workflow_run:
        workflows: ["Test"]
        types:
            - completed
        branches:
            - "**"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

        permissions:
            contents: read
            id-token: write

        steps:
            - name: Setup Action
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "latest"
                  registry-url: https://registry.npmjs.org/

            - name: Setup PNPM
              uses: pnpm/action-setup@v4

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Build
              run: node --run build

            - name: Generate dev version
              id: version
              run: echo "DEV_VERSION=dev.$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

            - name: Publish dev packages
              run: |
                  for dir in packages/*/; do
                    if [ -f "$dir/package.json" ]; then
                      cd "$dir"
                      PACKAGE_NAME=$(node -p "require('./package.json').name")
                      CURRENT_VERSION=$(node -p "require('./package.json').version")
                      DEV_VERSION="${CURRENT_VERSION}-${{ steps.version.outputs.DEV_VERSION }}"
                      
                      # Get all dev versions and deprecate them
                      echo "Deprecating old dev versions of $PACKAGE_NAME..."
                      npm view "$PACKAGE_NAME" versions --json | jq -r '.[]' | grep -E 'dev\.[0-9]+' | while read -r old_version; do
                        echo "Deprecating $PACKAGE_NAME@$old_version"
                        npm deprecate "$PACKAGE_NAME@$old_version" "Deprecated - use latest dev version" || true
                      done
                      
                      echo "Publishing $dir with version $DEV_VERSION..."
                      npm version "$DEV_VERSION" --no-git-tag-version
                      pnpm publish --provenance --no-git-checks --tag dev || true
                      echo "==========================================================================="
                      cd ../..
                    fi
                  done
              env:
                  NODE_AUTH_TOKEN: ${{secrets.NODETOKEN}}
