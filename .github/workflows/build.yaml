name: Dev Build

on:
    push:
        branches:
            - "**"
        paths-ignore:
            - "**.md"
            - "LICENSE"

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            id-token: write

        steps:
            - name: Setup Action
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "latest"
                  registry-url: https://registry.npmjs.org/

            - name: Setup PNPM
              uses: pnpm/action-setup@v4

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Build
              run: node --run build

            - name: Generate dev version
              id: version
              run: echo "DEV_VERSION=dev.$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

            - name: Publish dev packages
              run: |
                  for dir in packages/*/; do
                    if [ -f "$dir/package.json" ]; then
                      cd "$dir"
                      CURRENT_VERSION=$(node -p "require('./package.json').version")
                      DEV_VERSION="${CURRENT_VERSION}-${{ steps.version.outputs.DEV_VERSION }}"
                      echo "Publishing $dir with version $DEV_VERSION..."
                      npm version "$DEV_VERSION" --no-git-tag-version
                      pnpm publish --provenance --no-git-checks --tag dev || true
                      cd ../..
                    fi
                  done
              env:
                  NODE_AUTH_TOKEN: ${{secrets.NODETOKEN}}
